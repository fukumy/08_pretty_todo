<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Royal Todo List - ベルサイユの薫り</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="royal_icon.png">
    <link rel="apple-touch-icon" href="royal_icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#8b0000">
</head>
<body>
    <div class="royal-background"></div>
    <div class="main-container">
        <header>
            <div class="royal-icon-wrapper">
                <img src="royal_icon.png" alt="Royal Rose Icon" class="header-icon" width="60" height="60">
            </div>
            <h1>My Royal Todo</h1>
            <p class="subtitle">麗しき日々の旋律を記して...</p>
        </header>

        <section class="input-section">
            <div class="input-wrapper">
                <input type="text" id="todo-input" placeholder="新たな誓いをここに..." aria-label="新しいタスク">
                <button id="add-btn" class="jewel-button">
                    <span>追加</span>
                </button>
            </div>
        </section>

        <section class="list-section">
            <ul id="todo-list">
                <!-- タスクがここに追加されます -->
            </ul>
        </section>
        
        <footer>
            <p>&copy; 2024 Versailles Garden</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
